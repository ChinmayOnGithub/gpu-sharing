apiVersion: v1
kind: Pod
metadata:
  name: gpu-slice-test
  namespace: default
spec:
  restartPolicy: Never
  containers:
  - name: test-container
    image: nvidia/cuda:11.8-base-ubuntu20.04
    command: ["nvidia-smi"]
    resources:
      limits:
        example.com/gpu-slice: 2
      requests:
        example.com/gpu-slice: 2
  nodeSelector:
    accelerator: nvidia
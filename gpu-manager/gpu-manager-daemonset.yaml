apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gpu-manager
  namespace: kube-system
  labels:
    app: gpu-manager
    component: gpu-slice-manager
spec:
  selector:
    matchLabels:
      app: gpu-manager
  template:
    metadata:
      labels:
        app: gpu-manager
        component: gpu-slice-manager
    spec:
      # Run only on GPU nodes
      nodeSelector:
        accelerator: nvidia
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      hostNetwork: false  # Use cluster networking
      containers:
      - name: gpu-manager
        image: gpu-manager:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
          name: api
          protocol: TCP
        securityContext:
          privileged: true
          capabilities:
            add:
            - SYS_ADMIN
        volumeMounts:
        - name: nvidia-dev
          mountPath: /dev/nvidia0
        - name: dev
          mountPath: /dev
        - name: proc
          mountPath: /host/proc
          readOnly: true
        - name: sys
          mountPath: /host/sys
          readOnly: true
        - name: log
          mountPath: /var/log
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: GPU_TOTAL_MEMORY
          value: "6GB"
        - name: API_PORT
          value: "5000"
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: "compute,utility"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 10
      volumes:
      - name: nvidia-dev
        hostPath:
          path: /dev/nvidia0
          type: CharDevice
      - name: dev
        hostPath:
          path: /dev
          type: Directory
      - name: proc
        hostPath:
          path: /proc
          type: Directory
      - name: sys
        hostPath:
          path: /sys
          type: Directory
      - name: log
        hostPath:
          path: /var/log/gpu-manager
          type: DirectoryOrCreate
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: gpu-manager-service
  namespace: kube-system
  labels:
    app: gpu-manager
spec:
  type: ClusterIP
  ports:
  - port: 5000
    targetPort: 5000
    protocol: TCP
    name: api
  selector:
    app: gpu-manager
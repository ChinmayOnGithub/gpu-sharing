apiVersion: v1
kind: Pod
metadata:
  name: gpu-manager-test
  namespace: default
spec:
  restartPolicy: Never
  containers:
  - name: test-container
    image: curlimages/curl:latest
    command: ["/bin/sh"]
    args:
    - -c
    - |
      echo "=== Testing GPU Manager API ==="
      API_URL="http://gpu-manager-service.kube-system.svc.cluster.local:5000"
      
      echo "1. Health Check:"
      curl -s "$API_URL/health" || echo "Health check failed"
      echo
      
      echo "2. Status Check:"
      curl -s "$API_URL/status" || echo "Status check failed"
      echo
      
      echo "3. Allocate 2 slices:"
      curl -s -X POST "$API_URL/allocate" \
        -H "Content-Type: application/json" \
        -d '{"pod_name": "test-pod", "slices": 2}' || echo "Allocation failed"
      echo
      
      echo "4. Check status after allocation:"
      curl -s "$API_URL/status" || echo "Status check failed"
      echo
      
      echo "5. Release slices:"
      curl -s -X POST "$API_URL/release" \
        -H "Content-Type: application/json" \
        -d '{"pod_name": "test-pod"}' || echo "Release failed"
      echo
      
      echo "=== Test Complete ==="
  nodeSelector:
    accelerator: nvidia
apiVersion: apps/v1
kind: Deployment
metadata:
  name: custom-fractional-app
  namespace: default
  labels:
    app: custom-fractional-app
    scaler: custom-fractional
spec:
  replicas: 1
  selector:
    matchLabels:
      app: custom-fractional-app
      scaler: custom-fractional
  template:
    metadata:
      labels:
        app: custom-fractional-app
        scaler: custom-fractional
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        nvidia.com/gpu.present: "true"
      containers:
      - name: app
        image: gpu-fractional-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
          name: http
        
        resources:
          requests:
            example.com/gpu-slice: 1  # 1 GPU slice (1GB)
            cpu: "300m"
            memory: "512Mi"
          limits:
            example.com/gpu-slice: 1  # 1 GPU slice (1GB)
            cpu: "1000m"
            memory: "1Gi"
        
        env:
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: "compute,utility"
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: GPU_SLICE_ID
          value: "slice-1gb"
        - name: FRACTIONAL_GPU
          value: "1.0"
        - name: SCALER_TYPE
          value: "userscale"
        
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
        
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: custom-fractional-app
  namespace: default
  labels:
    app: custom-fractional-app
spec:
  selector:
    app: custom-fractional-app
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  type: ClusterIP

---
# Custom GPU-aware scaler
apiVersion: apps/v1
kind: Deployment
metadata:
  name: custom-gpu-scaler
  namespace: default
  labels:
    app: custom-gpu-scaler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: custom-gpu-scaler
  template:
    metadata:
      labels:
        app: custom-gpu-scaler
    spec:
      serviceAccountName: custom-gpu-scaler
      containers:
      - name: scaler
        image: custom-gpu-scaler:latest
        imagePullPolicy: Never
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: custom-gpu-scaler
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: custom-gpu-scaler
rules:
- apiGroups: ["apps"]
  resources: ["deployments", "deployments/scale", "deployments/status"]
  verbs: ["get", "list", "watch", "patch", "update"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: custom-gpu-scaler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: custom-gpu-scaler
subjects:
- kind: ServiceAccount
  name: custom-gpu-scaler
  namespace: default